const START = new Date(2026, 2, 27);
let viewYear = 2026, viewMonth = 2;
let selected = null;
let done = new Set();

function sessionForDate(d) {
  const diff = Math.floor((d - START) / 86400000);
  if (diff < 0 || diff >= sessions.length) return null;
  return { session: sessions[diff], dayNum: diff };
}

function formatDate(d) {
  return MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function renderStats() {
  const d = done.size;
  document.getElementById('s-done').textContent = d;
  document.getElementById('s-left').textContent = sessions.length - d;
  document.getElementById('s-hours').textContent = d + 'h';
  document.getElementById('s-pct').textContent = Math.round(d / sessions.length * 100) + '%';
}

function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DAYS.forEach(d => {
    const h = document.createElement('div');
    h.className = 'dow-hdr';
    h.textContent = d;
    grid.appendChild(h);
  });

  const first = new Date(viewYear, viewMonth, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const today = new Date(2026, 2, 25);

  for (let i = 0; i < startDow; i++) {
    const c = document.createElement('div');
    c.className = 'cal-cell empty';
    grid.appendChild(c);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(viewYear, viewMonth, day);
    const diff = Math.floor((d - START) / 86400000);
    const info = sessionForDate(d);
    const cell = document.createElement('div');
    const isToday = d.toDateString() === today.toDateString();
    const isSel = selected && d.toDateString() === selected.toDateString();
    const isDone = done.has(diff);
    cell.className = 'cal-cell' + (isToday ? ' today' : '') + (isSel ? ' selected' : '') + (isDone ? ' done' : '');

    const dateRow = document.createElement('div');
    dateRow.className = 'cell-date';
    const numCircle = document.createElement('div');
    numCircle.className = 'cell-day-num';
    if (isToday) { numCircle.style.background = '#378ADD'; numCircle.style.color = '#fff'; }
    numCircle.textContent = day;
    dateRow.appendChild(numCircle);
    cell.appendChild(dateRow);

    if (info) {
      const s = info.session;
      const dot = document.createElement('div');
      dot.className = 'cell-phase-dot';
      dot.style.background = PHASE_COLORS[s.phase];
      dot.style.marginBottom = '2px';
      cell.appendChild(dot);
      const topic = document.createElement('div');
      topic.className = 'cell-topic';
      topic.textContent = s.topic.length > 32 ? s.topic.slice(0, 30) + '…' : s.topic;
      cell.appendChild(topic);
      const pres = document.createElement('div');
      pres.className = 'cell-presenter';
      pres.textContent = s.presenter + ' presents · W' + s.week;
      cell.appendChild(pres);
      cell.onclick = () => { selected = d; renderCalendar(); renderDetail(d); };
    }
    grid.appendChild(cell);
  }

  document.getElementById('month-label').textContent = MONTHS[viewMonth] + ' ' + viewYear;
}

function renderDetail(d) {
  const panel = document.getElementById('detail-panel');
  const info = sessionForDate(d);
  if (!info) { panel.style.display = 'none'; return; }
  const s = info.session;
  const diff = info.dayNum;
  const isDone = done.has(diff);
  const phaseNames = ['Phase 1 — Foundations', 'Phase 2 — Core ML', 'Phase 3 — Deep Learning', 'Phase 4 — Production'];

  const hourHtml = s.hour.map(h => `
    <div class="hour-block" style="background:${PHASE_BG[s.phase]};border-color:${PHASE_COLORS[s.phase]}33">
      <div class="hour-time" style="color:${PHASE_COLORS[s.phase]}">${h.t}</div>
      <div class="hour-title">${h.title}</div>
      <div class="hour-desc">${h.desc}</div>
    </div>`).join('');

  const pillsHtml = s.concepts.map(c => `<span class="concept-pill">${c}</span>`).join('');
  const discussHtml = s.discuss.map(q => `<div class="discuss-item"><span class="discuss-dot"></span><span>${q}</span></div>`).join('');

  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-date-box">
        <div class="detail-month">${MONTHS[d.getMonth()].slice(0,3).toUpperCase()}</div>
        <div class="detail-day">${d.getDate()}</div>
        <div class="detail-dow">${DAYS[d.getDay()]}</div>
      </div>
      <div style="flex:1;min-width:0">
        <div class="detail-title">${s.topic}</div>
        <div class="detail-meta">${phaseNames[s.phase]} · Week ${s.week} · Day ${diff+1} of ${sessions.length}</div>
      </div>
      <button class="check-btn" onclick="toggleDone(${diff})" style="align-self:flex-start">${isDone ? '✓ Done' : 'Mark done'}</button>
    </div>
    <span class="detail-badge" style="background:${PHASE_BG[s.phase]};color:${PHASE_TEXT[s.phase]};border:0.5px solid ${PHASE_COLORS[s.phase]}44">${s.presenter} presents today</span>
    <div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">1-hour session breakdown</div>
    <div class="hour-grid">${hourHtml}</div>
    <div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Concepts covered</div>
    <div class="concepts-row" style="margin-bottom:12px">${pillsHtml}</div>
    <div class="discuss-box">
      <div class="discuss-label">Discussion questions for today</div>
      <div class="discuss-list">${discussHtml}</div>
    </div>`;
}

function toggleDone(diff) {
  if (done.has(diff)) done.delete(diff); else done.add(diff);
  renderStats();
  renderCalendar();
  if (selected) renderDetail(selected);
}

document.getElementById('prev-btn').onclick = () => {
  viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
};
document.getElementById('next-btn').onclick = () => {
  viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
};

renderStats();
renderCalendar();
</script>
